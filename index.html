<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no">
<title>Aditya the Devil</title>
<style>
html,body{margin:0;height:100%;overflow:hidden;font-family:Arial;background:#111;touch-action:none}
#game{position:fixed;inset:0;background:linear-gradient(#132b45 0 55%,#d5aa58 55%);overflow:hidden}
#hud{position:absolute;top:18px;left:10px;right:10px;display:flex;justify-content:space-between;color:white;font-size:19px;font-weight:900;text-shadow:2px 2px #000;z-index:20}
#place{position:absolute;top:60px;left:0;right:0;text-align:center;color:#ffeb3b;font-size:21px;font-weight:900;text-shadow:2px 2px #000;z-index:20}
.shop{position:absolute;bottom:220px;width:33%;height:90px;background:#c44a2f;border:4px solid #111}
.shop span{position:absolute;top:-46px;left:8px;right:8px;background:#fff176;border:4px solid #111;border-radius:12px;text-align:center;font-weight:900;padding:8px 0}
#road{position:absolute;bottom:110px;left:0;right:0;height:110px;background:#333;border-top:8px solid #111}
#line{position:absolute;bottom:160px;left:0;right:0;border-top:6px dashed white}

#aditya{position:absolute;bottom:178px;left:110px;width:145px;height:185px;z-index:10}
#aditya img{position:absolute;left:0;top:0;width:145px;height:145px;object-fit:cover;border-radius:24px;border:5px solid #111;box-shadow:0 0 22px red;background:white}
.belly{position:absolute;left:36px;top:105px;width:95px;height:78px;background:#ff2525;border:5px solid #111;border-radius:50%;transition:.08s}

.enemy{position:absolute;bottom:185px;width:52px;height:82px;z-index:5}
.eh{width:34px;height:34px;margin:auto;background:#ffd1a1;border:4px solid #111;border-radius:50%}
.eb{width:45px;height:44px;margin:auto;background:#2368db;border:4px solid #111;border-radius:10px}
.police .eb{background:#111}
.power{position:absolute;bottom:205px;background:#fff176;border:4px solid #111;border-radius:14px;padding:9px;font-weight:900;z-index:6}
.bubble{position:absolute;background:white;border:4px solid #111;border-radius:16px;padding:7px 10px;font-size:18px;font-weight:900;z-index:30}
#controls{position:absolute;bottom:20px;left:8px;right:8px;display:flex;justify-content:space-between;z-index:40}
button{border:5px solid white;border-radius:24px;background:#111;color:white;font-weight:900;font-size:18px}
.btn{width:90px;height:68px}
#smash{width:160px;background:#e60000;font-size:20px}
#menu,#over{position:absolute;inset:0;background:rgba(0,0,0,.7);z-index:60;display:flex;align-items:center;justify-content:center}
.card{width:86%;background:white;border:5px solid #111;border-radius:26px;text-align:center;padding:22px}
.card h1{color:#b00000;margin:0;font-size:30px}
.play{background:#e60000;color:white;border:0;border-radius:18px;padding:17px 42px;font-size:27px;font-weight:900}
#over{display:none}
</style>
</head>
<body>
<div id="game">
<div id="hud"><div>Score: <span id="score">0</span></div><div>High: <span id="high">0</span></div><div>Time: <span id="time">60</span></div></div>
<div id="place">MOHALI MADNESS</div>

<div class="shop" style="left:0"><span>CP67</span></div>
<div class="shop" style="left:33%"><span>PHASE 10</span></div>
<div class="shop" style="left:66%"><span>STADIUM</span></div>
<div id="road"></div><div id="line"></div>

<div id="aditya">
<img src="./7C034A7D-ADEA-4FB6-8D50-DF84AD006CA5.png">
<div class="belly"></div>
</div>

<div id="controls">
<button class="btn" id="left">LEFT</button>
<button id="smash">BELLY<br>SMASH</button>
<button class="btn" id="right">RIGHT</button>
</div>

<div id="menu"><div class="card">
<h1>Aditya the Devil</h1>
<h2>Mohali Madness</h2>
<p>Your uploaded character image is used now. Smash people, collect lassi, trigger Belly Fury.</p>
<button class="play" onclick="start()">PLAY</button>
</div></div>

<div id="over"><div class="card">
<h1>GAME OVER</h1>
<h2>Score: <span id="final">0</span></h2>
<p id="rank"></p>
<button class="play" onclick="start()">PLAY AGAIN</button>
</div></div>
</div>

<script>
let score=0,time=60,high=Number(localStorage.getItem("adityaFinalHigh")||0);
let x=110,left=false,right=false,running=false,smashing=false,fury=0;
let enemies=[],powers=[],loops=[];
const game=document.getElementById("game");
const aditya=document.getElementById("aditya");
const belly=document.querySelector(".belly");
document.getElementById("high").innerText=high;

function sound(freq,dur){
try{
let a=new(window.AudioContext||window.webkitAudioContext)();
let o=a.createOscillator();
let g=a.createGain();
o.connect(g);g.connect(a.destination);
o.frequency.value=freq;o.type="square";
g.gain.setValueAtTime(.08,a.currentTime);
o.start();o.stop(a.currentTime+dur);
}catch(e){}
}

function start(){
clearGame();
score=0;time=60;fury=0;running=true;x=110;
document.getElementById("score").innerText=0;
document.getElementById("time").innerText=60;
document.getElementById("menu").style.display="none";
document.getElementById("over").style.display="none";
sound(450,.12);
loops.push(setInterval(()=>{time--;document.getElementById("time").innerText=time;if(time<=0)end()},1000));
loops.push(setInterval(spawnEnemy,750));
loops.push(setInterval(spawnPower,3800));
requestAnimationFrame(loop);
}

function clearGame(){
loops.forEach(clearInterval);loops=[];
enemies.forEach(e=>e.el.remove());
powers.forEach(p=>p.el.remove());
enemies=[];powers=[];
document.querySelectorAll(".bubble").forEach(b=>b.remove());
}

function end(){
running=false;
loops.forEach(clearInterval);
sound(150,.5);
if(score>high){
high=score;
localStorage.setItem("adityaFinalHigh",high);
document.getElementById("high").innerText=high;
document.getElementById("rank").innerText="NEW HIGH SCORE!";
}else{
document.getElementById("rank").innerText="Try again.";
}
document.getElementById("final").innerText=score;
document.getElementById("over").style.display="flex";
}

function add(n){
score+=n;
document.getElementById("score").innerText=score;
}

function spawnEnemy(){
let el=document.createElement("div");
el.className=Math.random()<.25?"enemy police":"enemy";
el.innerHTML='<div class="eh"></div><div class="eb"></div>';
let side=Math.random()<.5?-80:innerWidth+80;
el.style.left=side+"px";
game.appendChild(el);
enemies.push({el:el,x:side,v:side<0?3+Math.random()*2:-(3+Math.random()*2),hit:false});
}

function spawnPower(){
let el=document.createElement("div");
el.className="power";
el.innerText=Math.random()<.7?"LASSI":"SAMOSA";
let px=20+Math.random()*(innerWidth-110);
el.style.left=px+"px";
game.appendChild(el);
powers.push({el:el,x:px,type:el.innerText});
setTimeout(()=>{if(el.parentNode)el.remove();powers=powers.filter(p=>p.el!==el)},5500);
}

function say(t,bx){
let b=document.createElement("div");
b.className="bubble";
b.innerText=t;
b.style.left=Math.max(5,Math.min(innerWidth-170,bx))+"px";
b.style.bottom="320px";
game.appendChild(b);
setTimeout(()=>b.remove(),800);
}

function smash(){
if(!running)return;
smashing=true;
belly.style.transform=fury>0?"scale(2.15)":"scale(1.65)";
say("BELLY SMASH!",x+35);
sound(90,.12);
if(navigator.vibrate)navigator.vibrate(80);
setTimeout(()=>{smashing=false;belly.style.transform="scale(1)"},260);
hitCheck();
}

function hitCheck(){
let range=fury>0?165:110;
enemies.forEach(e=>{
if(!e.hit&&Math.abs(e.x-x)<range){
e.hit=true;
e.v=e.x<x?-10:10;
add(fury>0?20:10);
sound(220,.08);
say(["OMG!","OYE HOYE!","KI HOYA?!"][Math.floor(Math.random()*3)],e.x);
}
});
}

function loop(){
if(!running)return;
if(left)x-=6;
if(right)x+=6;
x=Math.max(5,Math.min(innerWidth-150,x));
aditya.style.left=x+"px";

if(fury>0){fury--;document.getElementById("place").innerText="BELLY FURY MODE!"}
else document.getElementById("place").innerText="MOHALI MADNESS";

enemies.forEach(e=>{
e.x+=e.v;
e.el.style.left=e.x+"px";
if(e.hit){
e.el.style.bottom="250px";
e.el.style.transform="rotate(30deg)";
}
});
enemies=enemies.filter(e=>{
let ok=e.x>-160&&e.x<innerWidth+160;
if(!ok)e.el.remove();
return ok;
});

powers.forEach(p=>{
if(Math.abs(p.x-x)<90){
add(p.type=="LASSI"?25:35);
fury=360;
sound(650,.12);
say(p.type+" POWER!",p.x);
p.el.remove();
p.dead=true;
}
});
powers=powers.filter(p=>!p.dead);

if(smashing)hitCheck();
requestAnimationFrame(loop);
}

function hold(id,k){
let el=document.getElementById(id);
el.addEventListener("touchstart",e=>{
e.preventDefault();
if(k=="l")left=true;
if(k=="r")right=true;
if(k=="s")smash();
},{passive:false});
el.addEventListener("touchend",e=>{
e.preventDefault();
if(k=="l")left=false;
if(k=="r")right=false;
},{passive:false});
}
hold("left","l");
hold("right","r");
hold("smash","s");
</script>
</body>
</html>
