<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no">
<title>Aditya the Devil: Mohali Madness</title>
<style>
html,body{margin:0;height:100%;overflow:hidden;font-family:Arial;background:#5ecbff;touch-action:none}
#game{position:fixed;inset:0;overflow:hidden;background:linear-gradient(#61cfff 0 55%,#d9a851 55% 100%)}
#hud{position:absolute;top:18px;left:12px;right:12px;display:flex;justify-content:space-between;color:white;font-size:20px;font-weight:900;text-shadow:2px 2px #000;z-index:8}
#place{position:absolute;top:62px;left:0;right:0;text-align:center;color:white;font-size:19px;font-weight:900;text-shadow:2px 2px #000;z-index:8}
#road{position:absolute;bottom:96px;left:0;right:0;height:95px;background:#333;border-top:7px solid #222}
.line{position:absolute;bottom:138px;left:0;right:0;border-top:5px dashed white}
.shop{position:absolute;bottom:190px;width:31vw;height:82px;background:#d24a2d;border:4px solid #762112;border-radius:8px}
.shop span{position:absolute;top:-42px;left:8px;right:8px;background:#fff47a;border:4px solid #111;border-radius:12px;text-align:center;font-weight:900;font-size:18px;padding:8px 0}
#aditya{position:absolute;bottom:162px;left:38vw;width:92px;height:118px;z-index:5}
.head{position:absolute;left:20px;top:0;width:54px;height:54px;background:#ffc396;border:4px solid #111;border-radius:50%}
.h1,.h2{position:absolute;top:-18px;border-left:10px solid transparent;border-right:10px solid transparent;border-bottom:30px solid #b00000}.h1{left:24px}.h2{left:56px}
.eye{position:absolute;top:20px;left:36px;font-size:18px;font-weight:900}.name{position:absolute;top:38px;left:-2px;background:#111;color:white;border-radius:10px;padding:3px 8px;font-weight:900;font-size:12px}
.body{position:absolute;left:6px;top:55px;width:80px;height:58px;background:#d90000;border:4px solid #111;border-radius:45%}
.belly{position:absolute;left:34px;top:72px;width:58px;height:52px;background:#ffd3a2;border:4px solid #111;border-radius:50%;transition:.08s}
.enemy{position:absolute;bottom:160px;width:48px;height:78px;z-index:4}
.eh{width:32px;height:32px;margin:auto;background:#ffd1a1;border:4px solid #111;border-radius:50%}
.eb{width:42px;height:42px;margin:auto;background:#2368db;border:4px solid #111;border-radius:10px}
.power{position:absolute;bottom:174px;background:#fff47a;border:4px solid #111;border-radius:14px;padding:9px;font-weight:900;z-index:4}
.bubble{position:absolute;background:white;border:4px solid #111;border-radius:16px;padding:7px 10px;font-size:18px;font-weight:900;z-index:10}
#controls{position:absolute;bottom:18px;left:8px;right:8px;display:flex;justify-content:space-between;z-index:20}
.btn{width:88px;height:65px;border:4px solid white;border-radius:22px;background:#111;color:white;font-weight:900;font-size:18px}
#smash{width:150px;background:#e60000}
#menu,#over{position:absolute;inset:0;background:rgba(0,0,0,.6);z-index:30;display:flex;align-items:center;justify-content:center}
.card{width:86%;background:white;border:5px solid #111;border-radius:24px;text-align:center;padding:22px}
.card h1{color:#b00000;margin:0;font-size:30px}.card h2{margin:7px 0 12px}.card p{font-size:16px;line-height:1.35}
.play{background:#e60000;color:white;border:0;border-radius:18px;padding:17px 42px;font-size:27px;font-weight:900;box-shadow:0 7px 0 #7c0000}
#over{display:none}
</style>
</head>
<body>
<div id="game">
<div id="hud"><div>Score: <span id="score">0</span></div><div>High: <span id="high">0</span></div><div>Time: <span id="time">60</span></div></div>
<div id="place">MOHALI MADNESS - CP67 TO STADIUM</div>
<div class="shop" style="left:2vw"><span>LASSI SHOP</span></div>
<div class="shop" style="left:34vw"><span>CP67 MALL</span></div>
<div class="shop" style="left:66vw"><span>STADIUM</span></div>
<div id="road"></div><div class="line"></div>
<div id="aditya">
<div class="h1"></div><div class="h2"></div><div class="head"><div class="eye">&gt;:)</div></div><div class="name">ADITYA</div><div class="body"></div><div class="belly"></div>
</div>
<div id="controls">
<button class="btn" id="left">LEFT</button>
<button class="btn" id="smash">BELLY<br>SMASH</button>
<button class="btn" id="right">RIGHT</button>
</div>
<div id="menu"><div class="card"><h1>Aditya the Devil</h1><h2>Mohali Madness</h2><p>Move left/right. Hit people only with BELLY SMASH. Collect LASSI for Belly Fury.</p><button class="play" onclick="start()">PLAY</button></div></div>
<div id="over"><div class="card"><h1>GAME OVER</h1><h2>Score: <span id="final">0</span></h2><p id="rank"></p><button class="play" onclick="start()">PLAY AGAIN</button></div></div>
</div>
<script>
let score=0,time=60,high=Number(localStorage.getItem("high")||0);
let x=window.innerWidth/2-45,left=false,right=false,running=false,fury=0,smashing=false;
let enemies=[],powers=[],loops=[];
const game=document.getElementById("game"),aditya=document.getElementById("aditya"),belly=document.querySelector(".belly");
document.getElementById("high").innerText=high;
function start(){
clearGame();score=0;time=60;fury=0;running=true;x=innerWidth/2-45;
document.getElementById("score").innerText=0;document.getElementById("time").innerText=60;
document.getElementById("menu").style.display="none";document.getElementById("over").style.display="none";
loops.push(setInterval(()=>{time--;document.getElementById("time").innerText=time;if(time<=0)end()},1000));
loops.push(setInterval(spawnEnemy,750));
loops.push(setInterval(spawnPower,4200));
requestAnimationFrame(loop);
}
function clearGame(){
loops.forEach(clearInterval);loops=[];enemies.forEach(e=>e.el.remove());powers.forEach(p=>p.el.remove());
enemies=[];powers=[];document.querySelectorAll(".bubble").forEach(b=>b.remove());
}
function end(){
running=false;loops.forEach(clearInterval);
if(score>high){high=score;localStorage.setItem("high",high);document.getElementById("high").innerText=high;document.getElementById("rank").innerText="NEW HIGH SCORE!";}
else document.getElementById("rank").innerText="Try again for high score.";
document.getElementById("final").innerText=score;document.getElementById("over").style.display="flex";
}
function add(n){score+=n;document.getElementById("score").innerText=score}
function spawnEnemy(){
let el=document.createElement("div");el.className="enemy";el.innerHTML='<div class="eh"></div><div class="eb"></div>';
let side=Math.random()<.5?-70:innerWidth+70;el.style.left=side+"px";game.appendChild(el);
enemies.push({el,x:side,v:side<0?2.4+Math.random()*2.3:-(2.4+Math.random()*2.3),hit:false});
}
function spawnPower(){
let el=document.createElement("div");el.className="power";el.innerText=Math.random()<.5?"LASSI":"SAMOSA";
let px=20+Math.random()*(innerWidth-110);el.style.left=px+"px";game.appendChild(el);
powers.push({el,x:px});setTimeout(()=>{if(el.parentNode)el.remove();powers=powers.filter(p=>p.el!==el)},5500);
}
function say(t,bx,by=285){
let b=document.createElement("div");b.className="bubble";b.innerText=t;b.style.left=Math.max(6,Math.min(innerWidth-120,bx))+"px";b.style.bottom=by+"px";game.appendChild(b);setTimeout(()=>b.remove(),750);
}
function smash(){
if(!running)return;smashing=true;belly.style.transform=fury>0?"scale(1.85)":"scale(1.55)";say("BELLY SMASH!",x+35,300);
setTimeout(()=>{smashing=false;belly.style.transform="scale(1)"},260);hitCheck();
}
function hitCheck(){
let range=fury>0?140:95;
enemies.forEach(e=>{if(!e.hit&&Math.abs(e.x-x)<range){e.hit=true;e.v=e.x<x?-9:9;add(fury>0?20:10);say(["OMG!","OYE HOYE!","KI HOYA?!"][Math.floor(Math.random()*3)],e.x);}});
}
function loop(){
if(!running)return;
if(left)x-=5.8;if(right)x+=5.8;x=Math.max(5,Math.min(innerWidth-100,x));aditya.style.left=x+"px";
if(fury>0){fury--;document.getElementById("place").innerText="BELLY FURY MODE!";}else document.getElementById("place").innerText="MOHALI MADNESS - CP67 TO STADIUM";
enemies.forEach(e=>{e.x+=e.v;e.el.style.left=e.x+"px";if(e.hit){e.el.style.bottom="230px";e.el.style.transform="rotate(30deg)"}});
enemies=enemies.filter(e=>{let ok=e.x>-160&&e.x<innerWidth+160;if(!ok)e.el.remove();return ok});
powers.forEach(p=>{if(Math.abs(p.x-x)<75){add(25);fury=360;say("LASSI POWER +25",p.x,315);p.el.remove();p.dead=true;}});
powers=powers.filter(p=>!p.dead);
if(smashing)hitCheck();
requestAnimationFrame(loop);
}
function hold(id,kind){
let el=document.getElementById(id);
el.addEventListener("touchstart",e=>{e.preventDefault();if(kind=="l")left=true;if(kind=="r")right=true;if(kind=="s")smash()},{passive:false});
el.addEventListener("touchend",e=>{e.preventDefault();if(kind=="l")left=false;if(kind=="r")right=false},{passive:false});
el.addEventListener("mousedown",()=>{if(kind=="l")left=true;if(kind=="r")right=true;if(kind=="s")smash()});
el.addEventListener("mouseup",()=>{if(kind=="l")left=false;if(kind=="r")right=false});
}
hold("left","l");hold("right","r");hold("smash","s");
</script>
</body>
</html>
